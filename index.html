<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESTUDIO UNED – Generador de Prompts IA</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --panel-2:#1f2430;
      --text:#f3f5f7;
      --muted:#aab2bf;
      --accent:#4f8cff;
      --accent-2:#2ecc71;
      --danger:#e74c3c;
      --border:#2b3240;
      --shadow:0 12px 30px rgba(0,0,0,.28);
      --radius:14px;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0d0f14 0%, #131722 100%);
      color:var(--text);
      padding:24px;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    .app{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .header{
      padding:22px 24px 10px;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.02);
    }

    .title{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.1;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .content{
      padding:24px;
      display:grid;
      gap:18px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:18px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    label{
      font-size:14px;
      font-weight:700;
      color:#dce3ea;
    }

    select, textarea, input{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--panel-2);
      color:var(--text);
      padding:12px 14px;
      font:inherit;
      outline:none;
    }

    select:focus, textarea:focus, input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(79,140,255,.18);
    }

    textarea{
      min-height:280px;
      resize:vertical;
      line-height:1.5;
    }

    .hint{
      color:var(--muted);
      font-size:12px;
      margin-top:-2px;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
      font:inherit;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
    }

    .btn-primary{ background:var(--accent); color:#fff; }
    .btn-success{ background:var(--accent-2); color:#08140d; }
    .btn-danger{ background:var(--danger); color:#fff; }
    .btn-secondary{
      background:#2a3140;
      color:var(--text);
      border:1px solid var(--border);
    }

    .output{
      background:#0b0e13;
      border:1px solid var(--border);
      border-radius:12px;
      padding:16px;
      min-height:260px;
      white-space:pre-wrap;
      line-height:1.55;
      overflow:auto;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px 16px;
      color:var(--muted);
      font-size:12px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      background:#202634;
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:999px;
    }

    @media (max-width: 860px){
      .grid{ grid-template-columns:1fr; }
      .title{ font-size:24px; }
      body{ padding:14px; }
      .content{ padding:16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <div class="header">
        <h1 class="title">ESTUDIO UNED – Generador de Prompts IA</h1>
        <p class="subtitle">Pega el epígrafe o bloque que quieras trabajar, elige el tipo de salida y copia el prompt listo para usar en ChatGPT.</p>
      </div>

      <div class="content">
        <div class="grid">
          <div class="field">
            <label for="tipo">Tipo de salida</label>
            <select id="tipo">
              <option value="resumen">Resumen</option>
              <option value="ideas">Ideas clave</option>
              <option value="test">Preguntas test</option>
            </select>
            <div class="hint">Cada opción genera tu protocolo exacto con el texto pegado al final.</div>
          </div>
        </div>

        <div class="field">
          <label for="texto">Texto del epígrafe o bloque</label>
          <textarea id="texto" placeholder="Pega aquí el texto exacto del manual o del epígrafe..."></textarea>
          <div class="meta">
            <span class="badge">Longitud del texto: <strong id="chars">0</strong> caracteres</span>
            <span class="badge">Estado: <strong id="estado">Listo</strong></span>
          </div>
        </div>

        <div class="toolbar">
          <button class="btn-primary" onclick="generarPrompt()">Generar prompt</button>
          <button class="btn-success" onclick="copiarPrompt()">Copiar prompt</button>
          <button class="btn-secondary" onclick="descargarTxt()">Descargar .txt</button>
          <button class="btn-danger" onclick="limpiarTodo()">Limpiar</button>
        </div>

        <div class="field">
          <label for="resultado">Prompt generado</label>
          <div id="resultado" class="output"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const textoEl = document.getElementById("texto");
    const charsEl = document.getElementById("chars");
    const estadoEl = document.getElementById("estado");
    const resultadoEl = document.getElementById("resultado");
    const tipoEl = document.getElementById("tipo");

    textoEl.addEventListener("input", () => {
      charsEl.textContent = textoEl.value.length.toLocaleString("es-ES");
    });

    function getTextoFinal() {
      const texto = textoEl.value.trim();
      if (!texto) return "";
      return texto;
    }

    function promptResumen(texto) {
      return `ESTUDIO UNED GUÍA IA

RESUMEN:

Actúa como un profesor universitario experto.

Haz un resumen conceptual del siguiente texto cumpliendo estrictamente estas reglas:

1) No añadas información externa. Solo usa el contenido del texto.
2) No omitas ninguna idea nuclear.
3) Explica el contenido de forma clara, orientada a examen de desarrollo (nivel universitario/UNED).
4) Evita frases vacías o genéricas. Todo debe aportar contenido real.
5) El resumen debe ser más corto que el original, pero sin perder ninguna idea importante.
6) Debe ser sintético y contenido: no lo desarrolles como un tema completo ni como una explicación larga.
7) Resume de verdad: condensa, selecciona y reformula las ideas esenciales.

ESTRUCTURA:

8) Respeta todos los títulos y apartados del texto, sin inventar ninguno nuevo.
9) Normaliza la numeración con este formato: 1. / 1.1. / 1.1.1. (siempre con punto).
10) Epígrafes principales en MAYÚSCULAS; subepígrafes primera letra en mayúscula despues en minúsculas.
11) No inventes epígrafes ni cambies los títulos.

ESTILO:

12) El resultado debe ser un resumen narrativo estructurado, no un esquema.
13) Redacta en párrafos claros y continuos.
14) Está prohibido usar enumeraciones internas (ni números, ni letras, ni listas).

FORMATO:

15) Texto plano y limpio, sin sangrías ni formatos especiales.
16) Usa un único salto de línea entre párrafos.

RESTRICCIONES:

17) No incluyas enlaces ni URLs.
18) Devuelve solo el resumen final.

Texto:




${texto}`;
    }

    function promptIdeas(texto) {
      return `ESTUDIO UNED GUÍA IA

IDEAS CLAVE:

Actúa como un profesor universitario experto.
A partir del siguiente texto, extrae las IDEAS CLAVE cumpliendo estas reglas:
1) No añadas información externa.
2) No omitas conceptos importantes.
3) Debe haber 1 idea clave por cada epígrafe o subepígrafe con contenido real.
4) Cada idea debe ser conceptual, clara y útil para memorizar y desarrollar en examen.
5) No copies frases literales largas del texto: reformula con fidelidad.
6) Redacción breve pero con contenido jurídico o conceptual real.
7) Devuelve el resultado en formato de objeto JavaScript.
8) Respeta exactamente esta estructura:

const IDEAS_CLAVE = {
"1.1": "Idea clave...",
"1.2": "Idea clave...",
"1.3": "Idea clave..."
};

9) La clave debe ser el número exacto del epígrafe o subepígrafe.
10) El valor debe ser una sola frase o un breve párrafo compacto.
11) No escribas explicaciones fuera del bloque de código.
12) Devuelve únicamente el bloque de código.
13) El número de ideas clave debe adaptarse al contenido del texto, cubriendo todos los epígrafes relevantes sin redundancias.

Ejemplo de formato de salida:
const IDEAS_CLAVE = {
"1.1": "El régimen económico matrimonial regula las relaciones patrimoniales entre los cónyuges y fija las bases jurídicas de la organización económica del matrimonio.",
"1.2": "La autonomía de la voluntad permite a los cónyuges pactar su régimen económico, aunque dentro de los límites legales imperativos.",
"1.3": "Las disposiciones generales del Código Civil actúan como núcleo común aplicable a cualquier régimen económico matrimonial."
};

Texto:
${texto}`;
    }

    function promptTest(texto) {
      return `ESTUDIO UNED GUÍA IA

PREGUNTAS TEST:

Actúa como profesor universitario experto en evaluación tipo test (nivel UNED).
A partir del siguiente texto, genera preguntas tipo test con estas reglas:
1) Las preguntas deben ser conceptuales, no literales.
2) Cada pregunta debe evaluar comprensión real del contenido.
3) Debe haber 3 opciones: A, B y C.
4) Solo una opción puede ser correcta.
5) Las tres opciones deben ser plausibles, de longitud similar y con dificultad equilibrada.
6) Evita respuestas obvias o "cantadas".
7) La explicación debe ser breve, clara y útil para estudiar.
8) No añadas contenido externo al texto base.
9) Agrupa las preguntas bajo el epígrafe correspondiente.
10) Devuelve el resultado en formato de bloque de código, siguiendo exactamente esta estructura:

#ID = 1.1

// [1]
Q: ...
A) ...
B) ...
C) ...
OK: A
EXP: ...

// [2]
Q: ...
A) ...
B) ...
C) ...
OK: C
EXP: ...

#ID = 1.2

// [3]
Q: ...
A) ...
B) ...
C) ...
OK: B
EXP: ...

11) La numeración entre corchetes debe ser continua.
12) Cada bloque #ID debe corresponder a un epígrafe o subepígrafe real del texto.
13) No escribas nada fuera del bloque de preguntas.
14) Devuelve únicamente el contenido listo para copiar.
15) El número de preguntas debe ajustarse a la cantidad y complejidad del contenido, asegurando cobertura completa sin repetir ideas.
16) Dentro del mismo chat el numero de preguntas va consecutivo

Ejemplo de formato de salida:
#ID = 1.1

// [1]
Q: ¿Qué función cumplen las disposiciones generales del régimen económico matrimonial?
A) Establecen un sistema patrimonial único e inderogable para todos los matrimonios.
B) Fijan unas bases comunes aplicables a cualquier régimen económico del matrimonio.
C) Sustituyen automáticamente las capitulaciones pactadas por los cónyuges.
OK: B
EXP: Fijan el núcleo común imperativo que sirve de base a los distintos regímenes económico-matrimoniales.

// [2]
Q: ¿Qué relación existe entre el principio de igualdad conyugal y las disposiciones generales?
A) La igualdad conyugal actúa como fundamento constitucional de estas normas comunes.
B) La igualdad conyugal solo se aplica en el régimen de separación de bienes.
C) La igualdad conyugal depende exclusivamente de lo pactado por los cónyuges.
OK: A
EXP: Estas normas se orientan a garantizar la igualdad jurídica entre los cónyuges con independencia del régimen aplicable.

#ID = 1.2

// [3]
Q: ¿Hasta dónde alcanza la autonomía de la voluntad en el régimen económico matrimonial?
A) Permite excluir cualquier norma legal si ambos cónyuges están de acuerdo.
B) Solo opera en defecto de normas imperativas fijadas por la ley.
C) Se limita exclusivamente a la administración de bienes privativos.
OK: B
EXP: La libertad de pacto existe, pero no puede desplazar las normas imperativas que estructuran el sistema.

Texto:
${texto}`;
    }

    function generarPrompt() {
      const texto = getTextoFinal();

      if (!texto) {
        resultadoEl.textContent = "";
        estadoEl.textContent = "Falta texto";
        alert("Pega primero el texto del epígrafe o bloque.");
        return;
      }

      const tipo = tipoEl.value;
      let prompt = "";

      if (tipo === "resumen") prompt = promptResumen(texto);
      if (tipo === "ideas") prompt = promptIdeas(texto);
      if (tipo === "test") prompt = promptTest(texto);

      resultadoEl.textContent = prompt;
      estadoEl.textContent = "Prompt generado";
    }

    async function copiarPrompt() {
      const contenido = resultadoEl.textContent.trim();

      if (!contenido) {
        estadoEl.textContent = "Nada que copiar";
        alert("Primero genera el prompt.");
        return;
      }

      try {
        await navigator.clipboard.writeText(contenido);
        estadoEl.textContent = "Copiado";
      } catch (error) {
        estadoEl.textContent = "Error al copiar";
        alert("No se pudo copiar automáticamente. Copia manualmente el contenido.");
      }
    }

    function descargarTxt() {
      const contenido = resultadoEl.textContent.trim();

      if (!contenido) {
        estadoEl.textContent = "Nada que descargar";
        alert("Primero genera el prompt.");
        return;
      }

      const blob = new Blob([contenido], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = `prompt_${tipoEl.value}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      estadoEl.textContent = "TXT descargado";
    }

    function limpiarTodo() {
      textoEl.value = "";
      resultadoEl.textContent = "";
      charsEl.textContent = "0";
      estadoEl.textContent = "Listo";
      tipoEl.value = "resumen";
    }
  </script>
</body>
</html>
